# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

# Docs for the Azure Functions Deploy action:
# https://github.com/Azure/functions-action

name: Build and deploy Azure Functions - ai-academy-progress-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: backend/ai-academy-functions
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # REQUIRED for OIDC

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3️⃣ Install dependencies in Azure Functions directory
      - name: Install Azure Functions dependencies
        run: npm install
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      # 4️⃣ Login to Azure (THIS WAS MISSING)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9C50D43B95CE411DA8D709EB4029FE90 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F2C1993DE7F64CFDA801B2D7E54BCF0F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F3DAA7FB5DFE47888479742898DBC0DA }}

      # 5️⃣ Deploy Azure Functions
      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ai-academy-progress-api
          slot-name: Production
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
