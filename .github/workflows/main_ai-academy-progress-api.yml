name: Build and deploy Azure Functions - ai-academy-progress-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: backend/ai-academy-functions
  NODE_VERSION: '22.x'
  AZURE_SUBSCRIPTION_ID: ae3f9ad2-8b7d-4a8a-8652-2839e3c84234

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - name: Install Azure Functions dependencies
        run: npm install
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      # Azure OIDC login (auth only)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9C50D43B95CE411DA8D709EB4029FE90 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F2C1993DE7F64CFDA801B2D7E54BCF0F }}
          allow-no-subscriptions: true

      # ✅ DEPLOY — subscription explicitly provided here
      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ai-academy-progress-api
          slot-name: Production
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
