name: Build and deploy Azure Functions - ai-academy-progress-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FUNCTIONAPP_PATH: backend/ai-academy-functions
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Node
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3️⃣ Install deps
      - run: npm install
        working-directory: ${{ env.FUNCTIONAPP_PATH }}

      # 4️⃣ Zip the function app
      - name: Package function app
        run: |
          cd $FUNCTIONAPP_PATH
          zip -r ../functionapp.zip .
      
      # ✅ 5️⃣ Deploy via ZIP (NO Kudu validation)
      - name: Deploy to Azure Functions (ZIP)
        uses: Azure/webapps-deploy@v3
        with:
          app-name: ai-academy-progress-api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: functionapp.zip
