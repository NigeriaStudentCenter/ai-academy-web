name: ai_academy
description: A fully featured AI-powered learning app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  get: ^4.6.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
openidconnect_web: ^0.4.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.0

  webview_flutter: ^4.7.0
  video_player: ^2.8.2
  chewie: ^1.7.4
  youtube_player_flutter: ^8.1.2
  flutter_pdfview: ^1.2.7

  # ✅ Voice
  speech_to_text: ^6.6.1
  flutter_tts: ^3.8.5

  # ✅ PDF export
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/courses/